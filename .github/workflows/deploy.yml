name: CI/CD — Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — CI: Lint, type-check, and build
  # Runs on every push and pull request to main
  # ──────────────────────────────────────────────────────────────
  ci:
    name: CI — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (static export)
        run: npm run build

      - name: Upload build artifact
        # Only upload on pushes to main (not on PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — CD: Deploy to GitHub Pages
  # Only runs after CI passes, and only on pushes to main
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: CD — Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
